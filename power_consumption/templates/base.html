<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyStream AI - {% block title %}{% endblock %}</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
            <h1>EnergyStream <span class="badge">AI</span></h1>
        </div>
        <ul class="nav-links">
            <li><a href="/" id="nav-home">Home</a></li>
            <li><a href="/forecast" id="nav-forecast">Forecast Tool</a></li>
            <li><a href="/analysis" id="nav-analysis">Model Analysis</a></li>
            <li><a href="/about" id="nav-about">About Project</a></li>
            {% if session.get('user_id') %}
            <li><a href="/logout" class="btn btn-secondary" style="padding: 5px 15px; margin-left: 10px;">Logout</a>
            </li>
            {% else %}
            <li><a href="/login" id="nav-login">Login</a></li>
            {% endif %}
        </ul>
    </nav>

    <div class="glass-container">
        {% block content %}{% endblock %}
    </div>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Set active nav link
        const path = window.location.pathname;
        if (path === '/') document.getElementById('nav-home').classList.add('active');
        else if (path === '/forecast') document.getElementById('nav-forecast').classList.add('active');
        else if (path === '/analysis') document.getElementById('nav-analysis').classList.add('active');
        else if (path === '/about') document.getElementById('nav-about').classList.add('active');
    </script>
</body>

</html>
